events {
    worker_connections 4096;
}

http {
    # Load-balance REST + WebSocket (TCP) across both FastAPI instances
    upstream fastapi_backend {
        least_conn;
        server 127.0.0.1:8000;
        server 127.0.0.1:8001;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8080;
        server_name localhost;

        # REST API
        location /api/ {
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # WebSocket collab (Starlette path: /ws/doc/{edit_key})
        location /ws/ {
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}

stream {
    # Load-balance WebTransport / QUIC (UDP) across both WT processes
    upstream webtransport_backend {
        server 127.0.0.1:4433;
        server 127.0.0.1:4434;
    }

    server {
        listen 4443 udp reuseport;
        proxy_pass webtransport_backend;
        proxy_timeout 30s;
        proxy_responses 0;
    }
}
